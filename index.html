    ],
    correct: 1,

  },

const Q_COUNT = 10;
const MAX_SCORE = Q_COUNT * 10;
const LB_KEY = "tolerance-kviz-lb-v4";

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }
function pickRandom(arr, n) { return shuffle(arr).slice(0, n); }
function loadBoard() { try { return JSON.parse(localStorage.getItem(LB_KEY)) || []; } catch { return []; } }
function saveBoard(b) { try { localStorage.setItem(LB_KEY, JSON.stringify(b)); } catch {} }

function App() {
  const [phase, setPhase] = useState("name");
  const [name, setName] = useState("");
  const [questions, setQuestions] = useState([]);
  const [idx, setIdx] = useState(0);
  const [score, setScore] = useState(0);
  const [selected, setSelected] = useState(null);
  const [board, setBoard] = useState([]);
  const [tab, setTab] = useState("result");

  useEffect(() => { setBoard(loadBoard()); }, []);

  function startGame() {
    if (!name.trim()) return;
    const qs = pickRandom(Q, Q_COUNT).map(q => ({
      ...q,
      opts: shuffle(q.choices.map((c, i) => ({ text: c, isCorrect: i === q.correct }))),
    }));
    setQuestions(qs); setIdx(0); setScore(0); setSelected(null); setPhase("game");
  }

  function pick(opt) {
    if (selected) return;
    setSelected(opt);
    if (opt.isCorrect) setScore(s => s + 10);
  }

  function next() {
    if (idx + 1 >= questions.length) {
      const entry = { name: name.trim(), score, date: new Date().toLocaleDateString("cs-CZ") };
      const updated = [...board, entry].sort((a, b) => b.score - a.score).slice(0, 20);
      setBoard(updated); saveBoard(updated); setTab("result"); setPhase("end");
    } else {
      setIdx(i => i + 1); setSelected(null);
    }
  }

  const q = questions[idx];
  const pct = Math.round((score / MAX_SCORE) * 100);
  const endMsg = pct === 100 ? "Perfektní." : pct >= 80 ? "Hodně dobře." : pct >= 60 ? "Solidní základ." : pct >= 40 ? "Dost prostoru." : "Zamysli se nad svými volbami.";

  const C = {
    bg: "#f5f5f5", white: "#fff", text: "#111", muted: "#999",
    border: "#e8e8e8", accent: "#111",
    greenBg: "#f0fdf4", greenBorder: "#86efac", greenText: "#15803d",
    redBg: "#fef2f2", redBorder: "#fca5a5", redText: "#dc2626",
    dim: "#ccc",
  };

  function cStyle(opt) {
    if (!selected) return { background: C.white, border: "1.5px solid " + C.border, color: C.text };
    if (opt.isCorrect) return { background: C.greenBg, border: "1.5px solid " + C.greenBorder, color: C.greenText };
    if (opt === selected) return { background: C.redBg, border: "1.5px solid " + C.redBorder, color: C.redText };
    return { background: C.white, border: "1.5px solid " + C.border, color: C.dim };
  }

  const btn = { padding: "13px 28px", background: C.accent, color: "#fff", border: "none", borderRadius: 10, fontSize: 15, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" };

  return (
    <div style={{ background: C.bg, minHeight: "100vh" }}>
      <div style={{ maxWidth: 520, margin: "0 auto", padding: "40px 20px 100px" }}>

        <div style={{ marginBottom: 36 }}>
          <div style={{ fontSize: 28, fontWeight: 700, color: C.text, letterSpacing: -0.5 }}>Tolerance kvíz</div>
          <div style={{ fontSize: 14, color: C.muted, marginTop: 4 }}>hra o volbách v běžném životě</div>
        </div>

        {phase === "name" && (
          <div>
            <div style={{ fontSize: 12, fontWeight: 600, color: C.muted, letterSpacing: 1, textTransform: "uppercase", marginBottom: 8 }}>Tvoje přezdívka</div>
            <input value={name} onChange={e => setName(e.target.value)} onKeyDown={e => e.key === "Enter" && startGame()}
              placeholder="tvoje přezdívka" autoFocus
              style={{ width: "100%", padding: "13px 16px", border: "1.5px solid " + C.border, borderRadius: 10, background: C.white, fontSize: 16, color: C.text, fontFamily: "inherit", outline: "none", marginBottom: 16 }} />
            <button onClick={startGame} style={btn}>Začít →</button>
            {board.length > 0 && (
              <div style={{ marginTop: 48 }}>
                <div style={{ fontSize: 12, fontWeight: 600, color: C.muted, letterSpacing: 1, textTransform: "uppercase", marginBottom: 16 }}>Leaderboard</div>
                {board.slice(0, 10).map((e, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", padding: "10px 0", borderBottom: "1px solid " + C.border }}>
                    <span style={{ fontSize: 13, color: i < 3 ? C.text : C.muted, fontWeight: i < 3 ? 700 : 400, minWidth: 24 }}>{i + 1}.</span>
                    <span style={{ flex: 1, fontSize: 15, color: C.text, paddingLeft: 8 }}>{e.name}</span>
                    <span style={{ fontSize: 15, fontWeight: 700 }}>{e.score}</span>
                    <span style={{ fontSize: 12, color: C.muted, marginLeft: 12 }}>{e.date}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {phase === "game" && q && (
          <>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.muted, fontWeight: 600, letterSpacing: 1, textTransform: "uppercase", marginBottom: 16 }}>
              <span>{q.tag}</span>
              <span style={{ textTransform: "none", letterSpacing: 0, fontWeight: 400, fontSize: 13 }}>{idx + 1} / {Q_COUNT} · {score} b.</span>
            </div>
            <div style={{ height: 3, background: C.border, borderRadius: 99, marginBottom: 24 }}>
              <div style={{ height: "100%", width: (idx / Q_COUNT * 100) + "%", background: C.text, borderRadius: 99, transition: "width 0.35s" }} />
            </div>
            <div className="ascii">{q.art}</div>
            <p style={{ fontSize: 17, lineHeight: 1.75, color: C.text, fontWeight: 500, marginBottom: 22 }}>{q.text}</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 20 }}>
              {q.opts.map((opt, i) => (
                <button key={i} onClick={() => pick(opt)} disabled={!!selected}
                  style={{ ...cStyle(opt), borderRadius: 10, padding: "13px 16px", cursor: selected ? "default" : "pointer", textAlign: "left", fontFamily: "inherit", fontSize: 15, lineHeight: 1.5 }}>
                  {opt.text}
                </button>
              ))}
            </div>
            {selected && (
              <div style={{ fontSize: 14, color: "#555", lineHeight: 1.7, padding: "14px 16px", background: C.white, borderRadius: 10, border: "1.5px solid " + C.border, marginBottom: 16 }}>
                {q.feedback}
              </div>
            )}
            {selected && (
              <button onClick={next} style={btn}>
                {idx + 1 < Q_COUNT ? "Další →" : "Výsledky →"}
              </button>
            )}
          </>
        )}

        {phase === "end" && (
          <>
            <div style={{ display: "flex", borderBottom: "1.5px solid " + C.border, marginBottom: 32 }}>
              {["result", "board"].map(t => (
                <button key={t} onClick={() => setTab(t)}
                  style={{ padding: "10px 20px", border: "none", background: "none", fontFamily: "inherit", fontSize: 14, fontWeight: tab === t ? 600 : 400, color: tab === t ? C.text : C.muted, borderBottom: tab === t ? "2px solid " + C.text : "2px solid transparent", marginBottom: -1.5, cursor: "pointer" }}>
                  {t === "result" ? "Výsledek" : "Leaderboard"}
                </button>
              ))}
            </div>
            {tab === "result" && (
              <div>
                <div style={{ fontSize: 56, fontWeight: 700, color: C.text, lineHeight: 1 }}>{score}</div>
                <div style={{ fontSize: 14, color: C.muted, marginBottom: 24, marginTop: 4 }}>z {MAX_SCORE} bodů · {pct} %</div>
                <p style={{ fontSize: 16, color: "#444", lineHeight: 1.8, marginBottom: 36 }}>{endMsg}</p>
                <button onClick={() => setPhase("name")} style={btn}>Hrát znovu →</button>
              </div>
            )}
            {tab === "board" && (
              <div>
                {board.length === 0 && <div style={{ color: C.muted, fontSize: 14 }}>Zatím nikdo.</div>}
                {board.map((e, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", padding: "10px 8px", borderRadius: 8, background: e.name === name.trim() && e.score === score ? C.greenBg : "none" }}>
                    <span style={{ fontSize: 13, color: i < 3 ? C.text : C.muted, fontWeight: i < 3 ? 700 : 400, minWidth: 24 }}>{i + 1}.</span>
                    <span style={{ flex: 1, fontSize: 15, color: C.text, paddingLeft: 8, fontWeight: e.name === name.trim() && e.score === score ? 600 : 400 }}>{e.name}</span>
                    <span style={{ fontSize: 15, fontWeight: 700 }}>{e.score}</span>
                    <span style={{ fontSize: 12, color: C.muted, marginLeft: 12 }}>{e.date}</span>
                  </div>
                ))}
                <div style={{ marginTop: 24 }}>
                  <button onClick={() => setPhase("name")} style={btn}>Hrát znovu →</button>
                </div>
              </div>
            )}
          </>
        )}

        <div style={{ marginTop: 80, fontSize: 12, color: C.dim }}>By Samuel Brettschneider</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
